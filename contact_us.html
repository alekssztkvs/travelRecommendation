<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Contact Us</title>
        <link rel="stylesheet" href="./travel_recommendation.css">
    </head>
    <body>
        <nav class="navBar">
            <div class="navLeft"><p>TravelApp<img src="app_logo.jpg"></p></div>

            <div class="navLinks">
